<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
    <title>Управление навыками</title>
    <style>
        .skill-card { background: #f9f9f9; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .progress-bar { background: #e0e0e0; border-radius: 10px; overflow: hidden; height: 20px; }
        .progress-fill { background: #4caf50; height: 100%; width: 0%; }
        .level-badge { display: inline-block; background: #3f51b5; color: white; border-radius: 20px; padding: 2px 12px; font-size: 12px; }
        .controls { margin-top: 8px; }
        button.small { margin-right: 5px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; min-width: 300px; }
        label { display: block; margin-top: 8px; }
        input, select, textarea { width: 100%; margin-top: 4px; }
    </style>
</head>
<body>
<div data-include="/static/includes/header.html"></div>
<div class="main-content">
    <h1>🧠 Навыки и мастерство</h1>
    <p>Отслеживай часы, прокачивай ранги от новичка до профессора (10 000 часов).</p>
    
    <div class="controls">
        <button id="refreshSkillsBtn" class="primary">🔄 Обновить список</button>
        <button id="recalcSkillsBtn">📊 Пересчитать все навыки</button>
        <button id="addSkillBtn">➕ Добавить навык</button>
    </div>
    
    <div id="skillsList" style="margin-top: 20px;"></div>
</div>

<!-- Модальное окно для добавления/редактирования -->
<div id="skillModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Добавить навык</h2>
        <form id="skillForm">
            <input type="hidden" id="skillId">
            <label>Название *</label>
            <input type="text" id="skillName" required>
            <label>Привычка (связь)</label>
            <select id="habitId">
                <option value="">— Не привязана —</option>
            </select>
            <label>Минут за единицу привычки</label>
            <input type="number" id="minutesPerUnit" step="0.1" value="0">
            <label>Описание</label>
            <textarea id="description" rows="2"></textarea>
            <div class="controls" style="margin-top: 16px;">
                <button type="submit">Сохранить</button>
                <button type="button" id="cancelModalBtn">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script src="/static/include-loader.js"></script>
<script>
    let habitsList = [];
    
    async function fetchAPI(url, options = {}) {
        const res = await fetch(url, options);
        const data = await res.json();
        if (data.status !== 'success') throw new Error(data.message || 'API error');
        return data;
    }
    
    async function loadHabits() {
        const data = await fetchAPI('/api/habits/list');
        habitsList = data.data;
        const select = document.getElementById('habitId');
        select.innerHTML = '<option value="">— Не привязана —</option>' + 
            habitsList.map(h => `<option value="${h.id}">${h.name} (${h.category || 'Без категории'})</option>`).join('');
    }
    
    async function loadSkills() {
        try {
            const data = await fetchAPI('/api/skills/with-levels');
            renderSkills(data.data);
        } catch(e) {
            alert('Ошибка загрузки навыков: ' + e.message);
        }
    }
    
    function renderSkills(skills) {
        const container = document.getElementById('skillsList');
        if (!skills.length) {
            container.innerHTML = '<p>Нет навыков. Создайте первый!</p>';
            return;
        }
        container.innerHTML = skills.map(skill => {
            const hours = (skill.total_minutes / 60).toFixed(1);
            const remainingHours = (600000 - skill.total_minutes) / 60;
            return `
                <div class="skill-card" data-id="${skill.id}">
                    <div style="display: flex; justify-content: space-between;">
                        <strong>${escapeHtml(skill.name)}</strong>
                        <span class="level-badge">${skill.level_name} (ур. ${skill.level}/20)</span>
                    </div>
                    <div style="font-size: 13px; color: #555;">${skill.description || ''}</div>
                    <div>⏱ ${hours} ч / 10000 ч · ${(skill.total_minutes/600000*100).toFixed(1)}%</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${(skill.total_minutes/600000*100)}%;"></div></div>
                    <div style="font-size: 12px;">➡️ Следующий уровень: +${(skill.next_level_minutes/60).toFixed(1)} ч</div>
                    <div class="controls">
                        <button class="small edit-skill" data-id="${skill.id}">✎ Редактировать</button>
                        <button class="small delete-skill" data-id="${skill.id}">🗑 Удалить</button>
                    </div>
                </div>
            `;
        }).join('');
        
        // Навесить обработчики
        document.querySelectorAll('.edit-skill').forEach(btn => {
            btn.addEventListener('click', () => editSkill(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.delete-skill').forEach(btn => {
            btn.addEventListener('click', () => deleteSkill(parseInt(btn.dataset.id)));
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function addOrUpdateSkill() {
        const id = document.getElementById('skillId').value;
        const payload = {
            name: document.getElementById('skillName').value,
            habit_id: document.getElementById('habitId').value || null,
            minutes_per_unit: parseFloat(document.getElementById('minutesPerUnit').value) || 0,
            description: document.getElementById('description').value
        };
        try {
            if (id) {
                await fetchAPI(`/api/skills/update/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
            } else {
                await fetchAPI('/api/skills/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
            }
            closeModal();
            await loadSkills();
        } catch(e) {
            alert('Ошибка сохранения: ' + e.message);
        }
    }
    
    async function editSkill(id) {
        const data = await fetchAPI(`/api/skills/item/${id}`);
        const skill = data.data;
        document.getElementById('skillId').value = skill.id;
        document.getElementById('skillName').value = skill.name;
        document.getElementById('habitId').value = skill.habit_id || '';
        document.getElementById('minutesPerUnit').value = skill.minutes_per_unit;
        document.getElementById('description').value = skill.description || '';
        document.getElementById('modalTitle').innerText = 'Редактировать навык';
        document.getElementById('skillModal').style.display = 'flex';
    }
    
    async function deleteSkill(id) {
        if (!confirm('Удалить навык? Это не удалит привычки.')) return;
        await fetchAPI(`/api/skills/delete/${id}`, { method: 'DELETE' });
        await loadSkills();
    }
    
    async function recalcSkills() {
        try {
            await fetchAPI('/api/skills/recalc', { method: 'POST' });
            alert('✅ Навыки пересчитаны на основе истории привычек');
            await loadSkills();
        } catch(e) {
            alert('Ошибка пересчёта: ' + e.message);
        }
    }
    
    function openAddModal() {
        document.getElementById('skillId').value = '';
        document.getElementById('skillName').value = '';
        document.getElementById('habitId').value = '';
        document.getElementById('minutesPerUnit').value = '0';
        document.getElementById('description').value = '';
        document.getElementById('modalTitle').innerText = 'Добавить навык';
        document.getElementById('skillModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('skillModal').style.display = 'none';
    }
    
    document.getElementById('addSkillBtn').addEventListener('click', openAddModal);
    document.getElementById('recalcSkillsBtn').addEventListener('click', recalcSkills);
    document.getElementById('refreshSkillsBtn').addEventListener('click', loadSkills);
    document.getElementById('skillForm').addEventListener('submit', (e) => { e.preventDefault(); addOrUpdateSkill(); });
    document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
    document.querySelector('.close').addEventListener('click', closeModal);
    window.onclick = (e) => { if (e.target === document.getElementById('skillModal')) closeModal(); };
    
    loadHabits();
    loadSkills();
</script>
<div data-include="/static/includes/footer.html"></div>
</body>
</html>
